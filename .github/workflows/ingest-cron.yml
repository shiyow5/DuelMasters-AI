name: Ingest (cron)

# 取込バッチ (worker) は Node 前提 (pdf-parse 等) のため Cloudflare には載せず、
# GitHub Actions の cron で回す。
#
# ジョブごとに更新頻度も所要時間も違うので、まとめて1本にせず種別ごとに分ける。
# - regulations (殿堂): 改定は不定期だが軽い。毎日。
# - rules (総合ルール PDF): 改訂は年数回。週1で十分。URL とバージョンは自動発見する。
# - cards: 新弾のたび。週1。全件で時間がかかる。
# - rulings (裁定 Q&A): 3000件超・重複排除つき。週1。
# - tournaments (大会結果): 取込元の週次ランキングが翌月曜の夜に出る。火曜朝に週1。
# - deneblog (CS入賞デッキレシピ画像): 記事は毎日出るが一覧は新着順。火曜朝に週1で足りる。
# - snapshot (メタ集計): tournaments の直後に走らせる (取り込んだ結果を集計するため)。
#
# 手動実行 (workflow_dispatch) でジョブを選んで走らせられる。
on:
  schedule:
    # 毎日 03:00 JST (18:00 UTC) — 殿堂レギュレーション
    - cron: "0 18 * * *"
    # 毎週月曜 04:00 JST (19:00 UTC 日曜) — カード・ルール・裁定
    - cron: "0 19 * * 0"
    # 毎週火曜 06:00 JST (21:00 UTC 月曜) — 大会結果 → メタ集計
    #
    # 取込元の週次入賞数ランキングは「月〜日」の集計を **翌月曜の夜 (23:00 JST 前後)** に出す。
    # 月曜 04:00 JST の枠に相乗りさせると、その週のランキングが出る前に走ってしまい、
    # メタが常に1週遅れる。公開後に確実に回るよう翌朝へずらす。
    - cron: "0 21 * * 1"
  workflow_dispatch:
    inputs:
      job:
        # all は cron で回している取込をまとめて実行する。
        # tags は増分 (tags_updated_at IS NULL のカードのみ) なので、all に含めても安全 (#120)。
        # ただし**初回は全カードに LLM を当てる**ので時間と課金がかかる。
        description: "実行するジョブ (all = 全取込。tags は未試行カードのみ)"
        type: choice
        options:
          [regulations, rules, cards, rulings, faq, tournaments, deneblog, tags, snapshot, all]
        default: regulations

concurrency:
  # 取込は同じ本番 DB を書き換えるので、cron と手動実行を含めて全体を直列化する。
  # キーを job や schedule で分けると、週次 cron の裁定取込と手動の all が重なりうる。
  # ingest-rulings は qa_id 単位で DELETE→INSERT するため、重なると重複チャンクが残る。
  group: ingest
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  ingest:
    name: ingest ${{ matrix.job }}
    runs-on: ubuntu-latest
    # **rulings だけ**長い。現行 (約3,955件) + 過去 (約3,246件) の 7,200件超を1本で取り込むため
    # (一覧396ページ + 詳細7,200ページ + 埋め込み)。他のジョブまで 240分にすると、
    # そちらがハングしたときに気づくのが4時間後になる。
    timeout-minutes: ${{ matrix.job == 'rulings' && 240 || 90 }}
    strategy:
      fail-fast: false
      max-parallel: 1 # 公式サイトへの負荷と DB 書き込みの競合を避けるため直列
      matrix:
        # 並び順がそのまま実行順になる (max-parallel: 1)。
        # snapshot は tournaments が入れたデータを集計するので、必ず後ろに置く。
        # tags は cards の後ろに置く (その週の新規カードを同じ実行内でタグ付けするため)。
        job: [regulations, rules, cards, rulings, faq, tournaments, deneblog, tags, snapshot]
    steps:
      - name: 実行対象か判定
        id: scope
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_JOB: ${{ github.event.inputs.job }}
          JOB: ${{ matrix.job }}
        run: |
          run=false
          if [ -n "$INPUT_JOB" ]; then
            # 手動実行: 指定ジョブ。all は cron で回している取込をまとめて実行する。
            if [ "$INPUT_JOB" = "$JOB" ]; then
              run=true
            elif [ "$INPUT_JOB" = "all" ]; then
              case "$JOB" in regulations | rules | cards | rulings | faq | tournaments | deneblog | tags | snapshot) run=true ;; esac
            fi
          elif [ "$SCHEDULE" = "0 18 * * *" ]; then
            # 毎日: 殿堂のみ
            if [ "$JOB" = "regulations" ]; then run=true; fi
          elif [ "$SCHEDULE" = "0 19 * * 0" ]; then
            # 毎週月曜 04:00 JST: 重いもの。
            # tags は cards の後に走り、**その週の新規カードだけ**をタグ付けする (#120)。
            # tags_updated_at が NULL のものだけを対象にするので、既存カードを再課金しない。
            case "$JOB" in rules | cards | rulings | faq | tags) run=true ;; esac
          elif [ "$SCHEDULE" = "0 21 * * 1" ]; then
            # 毎週火曜 06:00 JST: 大会結果 → メタ集計 (matrix の並び順どおり直列に走る)
            case "$JOB" in tournaments | deneblog | snapshot) run=true ;; esac
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [ "$run" != "true" ]; then echo "::notice::$JOB は今回の対象外"; fi

      - name: Checkout
        if: steps.scope.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.scope.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.scope.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.scope.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        if: steps.scope.outputs.run == 'true'
        run: pnpm build

      - name: ingest ${{ matrix.job }}
        if: steps.scope.outputs.run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOB: ${{ matrix.job }}
        run: |
          # snapshot だけ script 名と引数が違う (メタ集計はフォーマットと期間を取る)。
          case "$JOB" in
            snapshot)
              pnpm --filter @dm-ai/worker snapshot:meta original 4
              pnpm --filter @dm-ai/worker snapshot:meta advance 4
              ;;
            *)
              pnpm --filter @dm-ai/worker "ingest:$JOB"
              ;;
          esac
