name: Deploy

# main の CI が成功したら Cloudflare Workers へデプロイする。
#
# CI と同じ push イベントで走らせると、テストが落ちていても本番に出てしまう。
# workflow_run で CI の成功を待ってから実行する。
#
# 手動デプロイだけに頼っていると main と本番が乖離する。実際、提供終了した Gemini モデルを
# 使う古い Worker が本番に残り続け、/api/chat が 500 を返していた (2026-07-13)。
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "デプロイ対象"
        type: choice
        options: [api, web, bot, all]
        default: api

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Deploy ${{ matrix.app }} Worker
    # CI は pull_request でも走る。conclusion == 'success' だけを見ると、未マージの PR コードが
    # workflow_run を発火させ、本番の Cloudflare 認証情報でデプロイされうる (fork の main ブランチ
    # からの PR は branches: [main] フィルタも通る)。push 起因の CI に限定する。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web, bot]
    steps:
      - name: Skip (対象外)
        id: scope
        env:
          EVENT: ${{ github.event_name }}
          TARGET: ${{ github.event.inputs.target }}
          APP: ${{ matrix.app }}
        run: |
          # bot Worker は Discord の Interactions Endpoint URL を設定するまで実配信されない。
          # 誤って未設定の状態で出し続けないよう、自動デプロイの対象は api / web に限る。
          # bot を出したいときは workflow_dispatch で明示的に選ぶ。
          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "$APP" ]; then run=true; else run=false; fi
          else
            case "$APP" in api | web) run=true ;; *) run=false ;; esac
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [ "$run" != "true" ]; then echo "::notice::$APP は対象外のためスキップ"; fi

      - name: Checkout
        if: steps.scope.outputs.run == 'true'
        uses: actions/checkout@v4
        # workflow_run は既定でデフォルトブランチの HEAD を取るが、CI が通ったコミットを
        # 明示して取り違えを防ぐ。
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup pnpm
        if: steps.scope.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.scope.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.scope.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      # ワークスペース package は dist を指すため、ビルドしないと wrangler が古い実装を束ねる。
      - name: Build workspace packages
        if: steps.scope.outputs.run == 'true'
        run: pnpm build

      # Secrets が未設定でもビルドは通ってしまう: lib/supabase.ts は env が空だと supabase を
      # null にするため、ログイン・デッキ保存が黙って無効な web が本番に出る。
      # 公開前に落とす。
      - name: Supabase の env が揃っているか確認 (web)
        if: steps.scope.outputs.run == 'true' && matrix.app == 'web'
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          missing=""
          [ -n "$SUPABASE_URL" ] || missing="$missing NEXT_PUBLIC_SUPABASE_URL"
          [ -n "$SUPABASE_ANON_KEY" ] || missing="$missing NEXT_PUBLIC_SUPABASE_ANON_KEY"
          if [ -n "$missing" ]; then
            echo "::error::web のビルドに必要な GitHub Secrets が未設定です:$missing"
            echo "::error::この状態でビルドするとログイン機能が無効な web が本番に出ます。"
            exit 1
          fi

      # web は OpenNext で Workers 用にバンドルし直す (.open-next/worker.js を作る)。
      # NEXT_PUBLIC_* はビルド時にバンドルへ埋め込まれるため、ここで渡さないと反映されない。
      - name: OpenNext build (web)
        if: steps.scope.outputs.run == 'true' && matrix.app == 'web'
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://dm-ai-api.shiyow.workers.dev' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm cf:build

      - name: Deploy to Cloudflare Workers
        if: steps.scope.outputs.run == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.app }}
          command: deploy
