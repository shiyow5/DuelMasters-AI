services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - db

  bot:
    build:
      context: .
      dockerfile: infra/docker/bot.Dockerfile
    env_file: .env
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dm_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./infra/sql/002_cards_official_id_unique.sql:/docker-entrypoint-initdb.d/002_cards_official_id_unique.sql
      - ./infra/sql/003_features.sql:/docker-entrypoint-initdb.d/003_features.sql
      - ./infra/sql/004_enable_rls.sql:/docker-entrypoint-initdb.d/004_enable_rls.sql
      - ./infra/sql/005_pgvector_update.sql:/docker-entrypoint-initdb.d/005_pgvector_update.sql
      - ./infra/sql/006_archetype_weekly_stats.sql:/docker-entrypoint-initdb.d/006_archetype_weekly_stats.sql

volumes:
  pgdata:
