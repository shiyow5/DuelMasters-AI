services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - db

  bot:
    build:
      context: .
      dockerfile: infra/docker/bot.Dockerfile
    env_file: .env
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dm_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ディレクトリごとマウントする。**1本ずつ列挙しない** — マイグレーションを足すたびに
      # ここへ書き足す運用は必ず忘れる (007 で実際に忘れた)。
      # postgres の初期化スクリプトはファイル名の辞書順に実行されるので、番号順で当たる。
      - ./infra/sql:/docker-entrypoint-initdb.d:ro

volumes:
  pgdata:
